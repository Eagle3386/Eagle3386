name: Update README cards

on:
  schedule:
    - cron: "42 23 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: border_radius=5&count_private=true&hide_title=true&include_all_commits=true&rank_icon=percentile&show=discussions_answered,discussions_started,reviews&show_icons=true&theme=solarized-dark&username=${{ github.repository_owner }}
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: custom_title=Languages%20in%20own,%20non-forked%20repos&langs_count=10&layout=compact&theme=solarized-dark&username=${{ github.repository_owner }}
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
